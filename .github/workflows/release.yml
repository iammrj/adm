name: Build And Release ADM

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: ADM
  APP_DISPLAY_NAME: Apex Download Manager
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Resolve version labels
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            LABEL="${GITHUB_REF_NAME#v}"
          else
            LABEL="dev-${GITHUB_RUN_NUMBER}"
          fi
          PKG_VERSION="$(echo "$LABEL" | sed -E 's/[^0-9.]/./g' | sed -E 's/\.+/./g' | sed -E 's/^\.|\.$//g')"
          if [[ -z "$PKG_VERSION" ]]; then
            PKG_VERSION="0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "pkg=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Build Windows executable
        if: runner.os == 'Windows'
        run: pyinstaller --noconfirm --clean --onefile --windowed --name "${{ env.APP_NAME }}" --icon assets/icons/adm.png main.py

      - name: Build macOS application bundle
        if: runner.os == 'macOS'
        run: pyinstaller --noconfirm --clean --windowed --name "${{ env.APP_NAME }}" --icon assets/icons/adm.png main.py

      - name: Build Linux executable
        if: runner.os == 'Linux'
        run: pyinstaller --noconfirm --clean --onefile --windowed --name "${{ env.APP_NAME }}" --icon assets/icons/adm.png main.py

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item "dist/${env:APP_NAME}.exe" "artifacts/Apex-Download-Manager-windows-x64.exe"
          Compress-Archive -Path "dist/${env:APP_NAME}.exe" -DestinationPath "artifacts/Apex-Download-Manager-windows-x64.zip" -Force

      - name: Package macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p artifacts
          DMG_NAME="Apex-Download-Manager-macos-${{ steps.version.outputs.label }}.dmg"
          PKG_NAME="Apex-Download-Manager-macos-${{ steps.version.outputs.label }}.pkg"
          hdiutil create -volname "${{ env.APP_DISPLAY_NAME }}" -srcfolder "dist/${{ env.APP_NAME }}.app" -ov -format UDZO "artifacts/${DMG_NAME}"
          pkgbuild --component "dist/${{ env.APP_NAME }}.app" \
            --identifier "com.apex.downloadmanager" \
            --version "${{ steps.version.outputs.pkg }}" \
            --install-location "/Applications" \
            "artifacts/${PKG_NAME}"

      - name: Package Linux artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p artifacts/deb-root/usr/local/bin artifacts/deb-root/DEBIAN
          install -m 755 "dist/${{ env.APP_NAME }}" "artifacts/deb-root/usr/local/bin/adm"
          cat > artifacts/deb-root/DEBIAN/control <<EOF
          Package: adm
          Version: ${{ steps.version.outputs.pkg }}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Apex Download Manager Team
          Description: Apex Download Manager (ADM)
           Multi-source segmented download manager with queueing and recovery.
          EOF
          dpkg-deb --build artifacts/deb-root "artifacts/Apex-Download-Manager-linux-amd64-${{ steps.version.outputs.label }}.deb"
          tar -C dist -czf "artifacts/Apex-Download-Manager-linux-x64-${{ steps.version.outputs.label }}.tar.gz" "${{ env.APP_NAME }}"
          rm -rf artifacts/deb-root

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish Release Assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Verify downloaded assets
        run: |
          find release-artifacts -type f | sort
          test -n "$(find release-artifacts -type f -print -quit)"

      - name: Create or update draft release with assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Apex Download Manager ${{ github.ref_name }}
          artifacts: "release-artifacts/*"
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          draft: true
          generateReleaseNotes: true
